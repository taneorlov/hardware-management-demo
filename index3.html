<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>eva-gGmbH Hardware Management Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #222;
    }

    .app {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    .header {
      padding: 28px 32px;
      border-bottom: 4px solid #d71920;
      display: flex;
      align-items: center;
      gap: 24px;
      background: #ffffff;
    }

    .header img {
      max-width: 220px;
      height: auto;
    }

    .header-text h1 {
      margin: 0;
      font-size: 30px;
      color: #d71920;
    }

    .header-text p {
      margin: 6px 0 0 0;
      color: #555;
      font-size: 16px;
    }

    .chat {
      padding: 28px 32px;
      min-height: 360px;
      background: #fafafa;
    }

    .message {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 14px;
      margin-bottom: 16px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 16px;
    }

    .user {
      background: #d71920;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: #ffffff;
      color: #222;
      border: 1px solid #e0e0e0;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    .input-area {
      display: flex;
      gap: 12px;
      padding: 20px 32px 28px 32px;
      background: white;
      border-top: 1px solid #e5e5e5;
    }

    textarea {
      flex: 1;
      height: 70px;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: none;
      box-sizing: border-box;
    }

    button {
      background: #d71920;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #b9151b;
    }

    .hint {
      padding: 0 32px 20px 32px;
      font-size: 14px;
      color: #666;
      background: white;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <img src="eva-logo.png" alt="eva-gGmbH Logo">
      <div class="header-text">
        <h1>Hardware Management Assistant</h1>
        <p>KI-fähige Suche in der Hardware- und Leasingverwaltung</p>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="message bot">
Willkommen. Stellen Sie eine Frage zur Hardwareverwaltung.

Beispiel:
Welche Hardware hat Max Müller?
      </div>
    </div>

    <div class="input-area">
      <textarea id="question" placeholder="Ihre Frage eingeben...">Welche Hardware hat Max Müller?</textarea>
      <button onclick="sendQuestion()">Senden</button>
    </div>

    <div class="hint">
      Datenquelle: Google Sheets / Make.com Webhook
    </div>
  </div>

  <script>
    async function sendQuestion() {
      const questionInput = document.getElementById("question");
      const chat = document.getElementById("chat");
      const question = questionInput.value.trim();

      if (!question) {
        return;
      }

      addMessage(question, "user");
      questionInput.value = "";

      const loadingMessage = addMessage("Anfrage wird verarbeitet...", "bot");

      try {
        const response = await fetch("https://hook.eu1.make.com/lhns675ezk2negqsl4xn7m63mxsfahmv", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question: question
          })
        });

        const text = await response.text();

        try {
          const data = JSON.parse(text);
          loadingMessage.textContent = data.answer || "Keine Antwort erhalten.";
        } catch (parseError) {
          loadingMessage.textContent = text || "Keine Antwort erhalten.";
        }

      } catch (error) {
        loadingMessage.textContent = "Fehler beim Senden der Anfrage: " + error.message;
      }
    }

    function addMessage(text, type) {
      const chat = document.getElementById("chat");
      const message = document.createElement("div");

      message.className = "message " + type;
      message.textContent = text;

      chat.appendChild(message);
      chat.scrollTop = chat.scrollHeight;

      return message;
    }
  </script>
</body>
</html>
